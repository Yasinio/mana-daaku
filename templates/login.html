<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mana Daakuu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        p {
            text-align: center;
            color: #666;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1f7a1f;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #166216;
        }

        .error {
            background: #ffe5e5;
            color: #b00020;
            padding: 10px;
            border-radius: 8px;
            margin-top: 14px;
            text-align: center;
        }

        .success {
            background: #e7f7e7;
            color: #166216;
            padding: 10px;
            border-radius: 8px;
            margin-top: 14px;
            text-align: center;
        }

        .forgot-wrap {
            margin-top: 14px;
            text-align: center;
        }

        .forgot-wrap a {
            color: #1f7a1f;
            font-weight: bold;
            text-decoration: none;
        }

        .forgot-wrap a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Mana Daakuu Admin</h1>
        <p>Login to access the owner dashboard</p>

        <form method="post" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="forgot-wrap">
            <a href="/forgot-password">Forgot password?</a>
        </div>

        {% if error_message %}
            <div class="error">{{ error_message }}</div>
        {% endif %}

        {% if success_message %}
            <div class="success">{{ success_message }}</div>
        {% endif %}
    </div>
</body>
</html>
