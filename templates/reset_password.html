<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Mana Daakuu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        p {
            text-align: center;
            color: #666;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1f7a1f;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #166216;
        }

        .success {
            background: #e7f7e7;
            color: #166216;
            padding: 10px;
            border-radius: 8px;
            margin-top: 14px;
            text-align: center;
        }

        .error {
            background: #ffe5e5;
            color: #b00020;
            padding: 10px;
            border-radius: 8px;
            margin-top: 14px;
            text-align: center;
        }

        .back-link {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: #1f7a1f;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Reset Password</h1>
        <p>Choose a new password for your admin account.</p>

        <form method="post" action="/reset-password">
            <input type="hidden" name="token" value="{{ token }}">

            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required>

            <button type="submit">Reset Password</button>
        </form>

        {% if success_message %}
            <div class="success">{{ success_message }}</div>
        {% endif %}

        {% if error_message %}
            <div class="error">{{ error_message }}</div>
        {% endif %}

        <a class="back-link" href="/login">← Back to Login</a>
    </div>
</body>
</html>
